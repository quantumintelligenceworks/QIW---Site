<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — QuantumAI</title>
  <meta name="description" content="This page doesn't exist — but the rest of the system does." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#0A0A0A" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0A'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23C8C8C8' stroke-width='2'/%3E%3Cellipse cx='16' cy='16' rx='12' ry='5' fill='none' stroke='%23A32638' stroke-width='1.6' transform='rotate(-30 16 16)'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%23F5F5F2'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles inlined so the 404 renders regardless of the path GitHub Pages serves it from -->
  <style>
    :root{
      --black:#0A0A0A; --ink:#111111; --red:#A32638; --paper:#F5F5F2; --fog:#C8C8C8;
      --display:'Space Grotesk',system-ui,sans-serif; --body:'IBM Plex Sans',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0}
    body{
      min-height:100vh; display:grid; place-items:center; text-align:center;
      background:linear-gradient(180deg,var(--black) 0%,var(--ink) 100%);
      color:var(--fog); font-family:var(--body); line-height:1.6; padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .mark{width:48px;height:48px;margin:0 auto 28px}
    h1{font-family:var(--display); color:var(--paper); font-weight:600; letter-spacing:-0.03em;
       line-height:1.1; font-size:clamp(2rem,6vw,3rem)}
    p{margin-top:16px; font-size:clamp(1.125rem,2.5vw,1.25rem)}
    .btn{display:inline-flex; align-items:center; gap:8px; margin-top:32px;
      font-family:var(--display); font-weight:600; font-size:0.875rem; letter-spacing:0.08em;
      text-transform:uppercase; color:var(--paper); background:var(--red);
      padding:14px 40px; border-radius:8px; text-decoration:none;
      transition:background .25s ease, transform .15s ease}
    .btn:hover{background:#8C1F2F; transform:translateY(-2px)}
    a:focus-visible,.btn:focus-visible{outline:2px solid var(--red); outline-offset:2px}
    @media (prefers-reduced-motion:reduce){.btn{transition:none}}
  </style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
      <circle cx="16" cy="16" r="10" fill="none" stroke="#C8C8C8" stroke-width="2"/>
      <ellipse cx="16" cy="16" rx="13" ry="5.2" fill="none" stroke="#A32638" stroke-width="1.7" transform="rotate(-30 16 16)"/>
      <circle cx="26.4" cy="10.2" r="2.2" fill="#A32638"/>
      <circle cx="16" cy="16" r="2.6" fill="#F5F5F2"/>
    </svg>
    <h1>This page doesn't exist.</h1>
    <p>But the rest of the system does.</p>
    <a class="btn" href="/">Go Home</a>
  </main>
</body>
</html>
