      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#003A2B" stroke-width="2" rx="14"/>

